kind = "web"
previewPath = "/"
title = "Manglam Clinic"
version = "1.0.0"
id = "artifacts/manglam-clinic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23398

[services.development]
run = "pnpm --filter @workspace/manglam-clinic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manglam-clinic", "run", "build" ]
publicDir = "artifacts/manglam-clinic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23398"
BASE_PATH = "/"
